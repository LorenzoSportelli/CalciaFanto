<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La mia Rosa - FantaLega</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html" class="nav-brand"><span class="logo-icon">⚽</span>FantaLega</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
    <ul class="nav-menu" id="nav-menu">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="rosa.html" class="active">La mia rosa</a></li>
      <li><a href="formazione.html">Formazione</a></li>
      <li><a href="calendario.html">Calendario</a></li>
      <li><a href="classifica.html">Classifica</a></li>
      <li><a href="mercato.html">Mercato</a></li>
    </ul>
    <div class="nav-user">
      <span class="user-credits">💰 —</span>
      <div class="user-avatar">—</div>
      <a href="#" class="logout-btn" id="logout-btn">Esci</a>
    </div>
  </nav>

  <div class="page-container">
    <header class="page-header">
      <div>
        <h1>La mia Rosa</h1>
        <div class="roster-stats" id="roster-stats"></div>
      </div>
      <a href="mercato.html" class="btn btn-primary">+ Acquista giocatori</a>
    </header>

    <div class="roster-controls">
      <div class="search-box">
        <input type="text" id="player-search" placeholder="Cerca giocatore...">
      </div>
      <div class="filter-buttons">
        <button class="filter-btn active" data-role="all">Tutti</button>
        <button class="filter-btn" data-role="P">Portieri</button>
        <button class="filter-btn" data-role="D">Difensori</button>
        <button class="filter-btn" data-role="C">Centrocampisti</button>
        <button class="filter-btn" data-role="A">Attaccanti</button>
      </div>
    </div>

    <div class="roster-table-container">
      <table class="roster-table">
        <thead>
          <tr>
            <th>R</th>
            <th>Giocatore</th>
            <th>Squadra</th>
            <th title="Quotazione">Q.</th>
            <th title="Media voto">MV</th>
            <th title="FantaMedia">FM</th>
            <th title="Presenze">Pres.</th>
            <th title="Gol">G</th>
            <th title="Assist">A</th>
            <th>Stato</th>
          </tr>
        </thead>
        <tbody id="roster-body"></tbody>
      </table>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    const session = Auth.requireAuth();
    const team = Store.getTeam(session.userId);

    UI.setNavUser(session, team);
    document.getElementById('logout-btn').onclick = e => { e.preventDefault(); Auth.logout(); };
    document.getElementById('nav-toggle').onclick = () => document.getElementById('nav-menu').classList.toggle('active');

    const players = Store.getPlayersByIds(team.rosterIds || []);

    // Stats header
    const roleCount = { P: 0, D: 0, C: 0, A: 0 };
    players.forEach(p => roleCount[p.role]++);
    document.getElementById('roster-stats').innerHTML = `
      <span class="roster-stat"><strong>${players.length}</strong> giocatori</span>
      <span class="roster-stat"><strong>${team.credits}</strong> crediti disponibili</span>
      <span class="roster-stat text-muted" style="font-size:12px;">P:${roleCount.P} D:${roleCount.D} C:${roleCount.C} A:${roleCount.A}</span>
    `;

    // Group by role
    const roles = [
      { key: 'P', label: 'Portieri' },
      { key: 'D', label: 'Difensori' },
      { key: 'C', label: 'Centrocampisti' },
      { key: 'A', label: 'Attaccanti' },
    ];

    const roleColors = { P: 'role-p', D: 'role-d', C: 'role-c', A: 'role-a' };

    function renderRoster(filterRole = 'all', searchTerm = '') {
      const tbody = document.getElementById('roster-body');
      let html = '';
      const search = searchTerm.toLowerCase();

      roles.forEach(r => {
        if (filterRole !== 'all' && filterRole !== r.key) return;
        const rPlayers = players.filter(p => p.role === r.key && p.name.toLowerCase().includes(search));
        if (rPlayers.length === 0) return;

        html += `<tr class="role-header"><td colspan="10">${r.label} (${rPlayers.length})</td></tr>`;
        rPlayers.forEach(p => {
          const isInLineup = Object.values(team.lineup || {}).includes(p.id);
          const isCaptain = team.captainId === p.id;
          const isVice = team.viceCaptainId === p.id;
          html += `
            <tr data-role="${p.role}" data-id="${p.id}">
              <td><span class="role-badge ${roleColors[p.role]}">${p.role}</span></td>
              <td class="player-name-cell">
                ${p.name}
                ${isCaptain ? '<span class="text-gold fw-bold" title="Capitano"> ©</span>' : ''}
                ${isVice ? '<span class="text-muted fw-bold" title="Vice-capitano"> ©</span>' : ''}
                ${isInLineup ? '<span title="In formazione" style="color:var(--green); font-size:11px;"> ▶</span>' : ''}
              </td>
              <td>${p.team}</td>
              <td class="num text-gold fw-bold">${p.value}</td>
              <td class="num">${p.avgRating.toFixed(2)}</td>
              <td class="num text-green fw-bold">${p.fantaAvg.toFixed(2)}</td>
              <td class="num">${p.appearances}</td>
              <td class="num">${p.goals}</td>
              <td class="num">${p.assists}</td>
              <td>
                ${UI.getStatusBadge(true)}
              </td>
            </tr>`;
        });
      });

      tbody.innerHTML = html || `<tr><td colspan="10" class="text-muted" style="padding:20px; text-align:center;">Nessun giocatore trovato.</td></tr>`;
    }

    renderRoster();

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderRoster(this.dataset.role, document.getElementById('player-search').value);
      });
    });

    document.getElementById('player-search').addEventListener('input', function() {
      const activeRole = document.querySelector('.filter-btn.active')?.dataset.role || 'all';
      renderRoster(activeRole, this.value);
    });
  </script>
</body>
</html>
